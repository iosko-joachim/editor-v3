name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtcharts'

      - name: Configure CMake
        run: cmake -S editor_v3 -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: macdeployqt build/editor_v3.app

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - build/editor_v3.app

      - name: Package App Bundle as ZIP
        run: |
          cd build
          ditto -c -k --keepParent editor_v3.app editor_v3.app.zip

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: editor_v3-macos-app
          path: build/editor_v3.app.zip
